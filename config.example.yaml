# Copy to config.yaml and edit per campaign.

campaign:
  name: "example-campaign"
  # Paste the campaign's brief/description here -- the editing style below
  # is auto-picked from keywords in this text (see `editing`).
  description: ""
  hashtags: ["#fyp", "#clips"]
  caption_template: "{title} 🔥 {hashtags}"

clipping:
  min_clip_seconds: 20
  max_clip_seconds: 90
  # "auto" = 1 clip per minute of source video, minimum 1 (e.g. a 90s clip
  # of source video still makes just 1, a 60min video makes up to 60).
  # Set a number instead to pin an exact count regardless of length.
  max_clips_per_video: "auto"
  # Words/phrases that bump a segment's highlight score (case-insensitive).
  # Tune this per niche/creator.
  trigger_phrases:
    - "no way"
    - "what the"
    - "insane"
    - "crazy"
    - "let's go"
    - "i can't believe"

# Each of these can be true/false, or "auto" to derive it from
# campaign.description (see src/style.py for the keyword rules).
editing:
  jump_cuts: "auto"          # cut out dead air/silence for snappier pacing
  kenburns: "auto"           # subtle zoom/pan on otherwise-static shots
  caption_style: "auto"      # "line" (static) | "karaoke" (word-by-word highlight)
  silence_min_duration: "auto"   # seconds of silence before it counts as a cut

reframe:
  mode: "blur-bg"   # "blur-bg" | "center-crop"
  width: 1080
  height: 1920

captions:
  enabled: true
  font: "Arial"
  font_size: 34
  max_words_per_line: 4
  position: "bottom"   # "bottom" | "center"
  hook_enabled: true   # bold title-card line at the top for the clip's first ~1.6s

output_dir: "./output"
